name: Build y Deploy Scraper API

on:
  push:
    branches: [main]   # Se ejecuta cada vez que haces push a main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repo
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Login a Docker Hub
      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 3. Construir y subir la imagen
      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/scraper-api:latest

      # 4. Desplegar en el servidor (vía SSH)
      - name: Deploy en servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/scraper-api:latest
            docker stop scraper-api || true
            docker rm scraper-api || true
            docker run -d \
              --name scraper-api \
              --restart always \
              -p 8000:8000 \
              ${{ secrets.DOCKER_USERNAME }}/scraper-api:latest
            echo "Deploy completado"